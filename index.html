<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadid-Library – Milliy meros portali</title>
    <style>
        :root { 
            --primary: #1a1a1a; 
            --accent: #c5a059; 
            --bg: #f4f7f6; 
            --text: #333; 
            --cloud: #27ae60; 
            --menu-bg: #222;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); display: flex; }

        /* YON MENYU USLUBI */
        .side-menu {
            width: 280px;
            background-color: var(--menu-bg);
            color: white;
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            padding-top: 20px;
            overflow-y: auto;
            z-index: 1000;
        }

        .menu-item {
            padding: 15px 20px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .menu-item:hover { background-color: #333; }
        .menu-item a { color: white; text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        .dropdown-content { display: none; background-color: #111; padding-left: 20px; }
        .dropdown-content a { display: block; padding: 12px; color: #999; text-decoration: none; font-size: 0.85rem; border-bottom: 1px solid #222; }
        .dropdown-content a:hover { color: var(--accent); }
        .show { display: block; }

        /* ASOSIY KONTENT */
        .main-content { margin-left: 280px; width: calc(100% - 280px); }

        header { 
            background: linear-gradient(135deg, #0a2e52 0%, #154577 100%); 
            color: white; padding: 60px 20px; text-align: center; border-bottom: 5px solid var(--accent); 
        }

        .container { max-width: 1000px; margin: -30px auto 50px; padding: 0 20px; }
        
        /* JADIDLAR GALEREYASI */
        .jadid-gallery { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
        .jadid-item { text-align: center; width: 120px; }
        .jadid-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; background: white; }
        .jadid-name { font-size: 0.8rem; font-weight: bold; margin-top: 8px; color: #0a2e52; }

        /* KITOB KARTALARI */
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .book-card { 
            background: white; border-radius: 10px; padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; 
            border-bottom: 4px solid #ccc; transition: 0.3s;
        }
        .book-card:hover { transform: translateY(-5px); }
        .cloud-badge { 
            position: absolute; top: 15px; right: 15px; 
            background: var(--cloud); color: white; padding: 2px 8px; 
            border-radius: 10px; font-size: 0.7rem; 
        }
        .download-link { 
            display: inline-block; margin-top: 15px; text-decoration: none; 
            font-weight: bold; color: #0a2e52; border: 1px solid #0a2e52;
            padding: 8px 15px; border-radius: 5px; transition: 0.3s;
        }
        .download-link:hover { background: #0a2e52; color: white; }

        footer { background: #1a1a1a; color: #777; text-align: center; padding: 30px; font-size: 0.9rem; }
    </style>
</head>
