<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadidlar Kutubxonasi | Sodiqjon Xatamov</title>
    <style>
        :root { 
            --primary: #0a2e52; 
            --accent: #c5a059; 
            --bg: #f4f7f6; 
            --cloud: #27ae60; 
            --menu-bg: #1c1c1c; 
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg); display: flex; color: #333; }

        /* YON PANEL */
        .side-menu {
            width: 260px;
            background-color: var(--menu-bg);
            color: white;
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            padding-top: 20px;
            z-index: 1000;
            overflow-y: auto;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
        }

        .menu-header { padding: 0 20px 20px; border-bottom: 1px solid #333; text-align: center; }
        .menu-header h2 { font-size: 1.2rem; color: var(--accent); margin: 0; }

        .menu-item {
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu-item:hover { background-color: #2a2a2a; }
        .menu-item a { color: #eee; text-decoration: none; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }

        .dropdown-content { display: none; background-color: #111; border-left: 3px solid var(--accent); }
        .dropdown-content a { display: block; padding: 12px 35px; color: #aaa; font-size: 0.85rem; border-bottom: 1px solid #222; }
        .dropdown-content a:hover { color: white; background: #222; }
        .show { display: block; }

        /* ASOSIY QISM */
        .main-content { margin-left: 260px; width: 100%; min-height: 100vh; }

        header { 
            background: linear-gradient(135deg, var(--primary) 0%, #154577 100%); 
            color: white; padding: 60px 20px; text-align: center; 
            border-bottom: 5px solid var(--accent);
        }

        .container { max-width: 1100px; margin: -40px auto 50px; padding: 0 20px; }

        /* JADIDLAR GALEREYASI */
        .jadid-gallery { 
            display: flex; justify-content: center; gap: 25px; 
            margin-bottom: 50px; flex-wrap: wrap; background: white; 
            padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .jadid-item { text-align: center; width: 130px; }
        .jadid-img { 
            width: 110px; height: 110px; border-radius: 50%; 
            border: 3px solid var(--accent); object-fit: cover; 
            background: #eee; transition: 0.4s; cursor: pointer;
        }
        .jadid-img:hover { transform: scale(1.1) rotate(5deg); }
        .jadid-name { font-size: 0.85rem; font-weight: bold; margin-top: 10px; color: var(--primary); }

        /* KITOB KARTALARI */
        .section-title { color: var(--primary); border-left: 6px solid var(--accent); padding-left: 15px; margin: 40px 0 25px; }
        
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .book-card { 
            background: white; border-radius: 12px; padding: 25px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative;
            border-top: 5px solid #ddd; transition: 0.3s;
        }
        .book-card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .cloud-badge { 
            position: absolute; top: 15px; right: 15px; 
            background: var(--cloud); color: white; padding: 3px 10px; 
            border-radius: 20px; font-size: 0.7rem; font-weight: bold;
        }

        .download-btn { 
            display: inline-block; margin-top: 20px; padding: 12px 20px;
            background: var(--primary); color: white; text-decoration: none;
            border-radius: 6px; font-size: 0.9rem; font-weight: bold;
            transition: 0.3s; text-align: center; width: 80%;
        }
        .download-btn:hover { background: var(--accent); }
        .btn-cloud { background: var(--cloud); }

        footer { background: var(--primary); color: #94a3b8; text-align: center; padding: 40px; margin-top: 50px; }

        /* Mobil qurilmalar uchun */
        @media (max-width: 768px) {
            .side-menu { display: none; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
